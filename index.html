<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日の天気</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #182033;
      --muted: #65708a;
      --panel: rgba(255, 255, 255, 0.78);
      --line: rgba(255, 255, 255, 0.72);
      --cyan: #00a9e8;
      --blue: #4568ff;
      --pink: #ff62b2;
      --gold: #ffc94b;
      --green: #21c997;
      --shadow: 0 30px 90px rgba(35, 45, 80, 0.22);
      font-family: "Inter", "Noto Sans JP", "Yu Gothic UI", "Hiragino Sans", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 18%, rgba(255, 201, 75, 0.58), transparent 24%),
        radial-gradient(circle at 86% 16%, rgba(255, 98, 178, 0.44), transparent 24%),
        radial-gradient(circle at 82% 82%, rgba(0, 169, 232, 0.42), transparent 28%),
        linear-gradient(135deg, #eaf9ff 0%, #fff7fb 44%, #fff9e8 100%);
      display: grid;
      place-items: center;
      padding: 22px;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: -40%;
      background:
        conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.64), transparent 18%),
        repeating-linear-gradient(90deg, transparent 0 42px, rgba(255,255,255,0.18) 43px 44px);
      animation: skySpin 28s linear infinite;
      opacity: 0.55;
      pointer-events: none;
    }

    main {
      width: min(100%, 820px);
      position: relative;
      z-index: 1;
    }

    .app {
      position: relative;
      overflow: hidden;
      min-height: 650px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.88);
      backdrop-filter: blur(22px) saturate(1.25);
      isolation: isolate;
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .app::before {
      background:
        linear-gradient(115deg, rgba(255,255,255,0.92), rgba(255,255,255,0.34) 40%, rgba(0,169,232,0.16)),
        radial-gradient(circle at 28% 24%, rgba(255,255,255,0.95), transparent 18%),
        radial-gradient(circle at 86% 68%, rgba(255,98,178,0.18), transparent 24%);
    }

    .app::after {
      width: 42%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.52), transparent);
      transform: skewX(-18deg) translateX(-155%);
      animation: sweep 5.6s ease-in-out infinite;
    }

    .sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      left: var(--x);
      top: var(--y);
      border-radius: 50%;
      background: radial-gradient(circle, #fff 0 20%, var(--color) 22% 45%, transparent 48%);
      filter: drop-shadow(0 0 12px var(--color));
      opacity: 0;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 650px;
      grid-template-rows: auto 1fr auto;
      gap: 28px;
      padding: clamp(22px, 5vw, 48px);
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      animation: riseIn 650ms ease both;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4.2vw, 2.5rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .status {
      min-width: 118px;
      border: 1px solid rgba(255,255,255,0.76);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.66);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      padding: 10px 14px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 10px 30px rgba(69,104,255,0.12);
    }

    .status[data-tone="ok"] {
      color: #126c4d;
      background: rgba(225, 255, 241, 0.82);
    }

    .status[data-tone="demo"] {
      color: #8a5a00;
      background: rgba(255, 246, 209, 0.86);
    }

    .status[data-tone="error"] {
      color: #a73557;
      background: rgba(255, 231, 241, 0.86);
    }

    .hero {
      display: grid;
      align-content: center;
      gap: 28px;
      padding: 10px 0;
    }

    .place {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      font-weight: 900;
      animation: riseIn 720ms 80ms ease both;
    }

    .pin {
      display: inline-grid;
      place-items: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #e9fbff);
      color: var(--blue);
      box-shadow: 0 10px 24px rgba(0, 169, 232, 0.22);
      animation: bob 2.8s ease-in-out infinite;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 22px;
    }

    .temperature {
      display: flex;
      align-items: start;
      gap: 8px;
      min-width: 0;
      animation: riseIn 820ms 150ms ease both;
    }

    .temperature strong {
      font-size: clamp(5.8rem, 20vw, 10.5rem);
      line-height: 0.84;
      letter-spacing: 0;
      background: linear-gradient(120deg, #182033 5%, #4568ff 38%, #ff62b2 72%, #ffc94b 100%);
      background-size: 180% 180%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: tempGlow 4.4s ease-in-out infinite;
      filter: drop-shadow(0 16px 22px rgba(69, 104, 255, 0.14));
    }

    .temperature span {
      margin-top: clamp(10px, 2.8vw, 20px);
      color: var(--muted);
      font-size: clamp(1.35rem, 4vw, 2.15rem);
      font-weight: 950;
    }

    .condition {
      display: grid;
      justify-items: center;
      gap: 10px;
      min-width: 156px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      background: linear-gradient(150deg, rgba(255,255,255,0.82), rgba(255,255,255,0.44));
      box-shadow: 0 18px 36px rgba(69,104,255,0.13), inset 0 1px 0 rgba(255,255,255,0.9);
      animation: floatCard 4s ease-in-out infinite, riseIn 760ms 230ms ease both;
    }

    .emoji {
      font-size: clamp(4.5rem, 12vw, 7rem);
      line-height: 1;
      filter: drop-shadow(0 14px 18px rgba(255, 174, 66, 0.24));
      animation: emojiDance 2.8s ease-in-out infinite;
    }

    .condition-name {
      color: var(--ink);
      font-size: clamp(1.25rem, 4vw, 1.9rem);
      font-weight: 950;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      animation: riseIn 860ms 320ms ease both;
    }

    .metric {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.62);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
      background: rgba(255,255,255,0.46);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto 12px 0;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--gold));
      animation: pulseLine 2.2s ease-in-out infinite;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: clamp(1rem, 3vw, 1.2rem);
      line-height: 1.35;
    }

    .city-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 8px;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.48);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.86);
      animation: riseIn 900ms 420ms ease both;
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 950;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.72);
      color: var(--blue);
      transform: translateY(-1px);
    }

    button:focus-visible {
      outline: 3px solid rgba(69, 104, 255, 0.32);
      outline-offset: 3px;
    }

    button[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--blue), var(--cyan) 52%, var(--pink));
      color: #ffffff;
      box-shadow: 0 16px 32px rgba(69, 104, 255, 0.32);
      animation: selectedPulse 2.7s ease-in-out infinite;
    }

    button:active {
      transform: translateY(1px);
    }

    .message {
      min-height: 28px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 700;
      line-height: 1.6;
      animation: fadeIn 400ms ease both;
    }

    .skeleton .temperature strong,
    .skeleton .condition,
    .skeleton .metric strong {
      color: transparent;
      background: linear-gradient(90deg, rgba(255,255,255,0.28), rgba(255,255,255,0.92), rgba(255,255,255,0.28));
      background-size: 240% 100%;
      animation: shine 1.1s ease-in-out infinite;
    }

    .skeleton .temperature strong {
      border-radius: 8px;
    }

    @keyframes skySpin {
      to { transform: rotate(360deg); }
    }

    @keyframes sweep {
      0%, 42% { transform: skewX(-18deg) translateX(-155%); }
      68%, 100% { transform: skewX(-18deg) translateX(255%); }
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
      38%, 58% { opacity: 0.92; transform: scale(1.35) rotate(180deg); }
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    @keyframes tempGlow {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes emojiDance {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50% { transform: rotate(4deg) scale(1.08); }
    }

    @keyframes floatCard {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-9px); }
    }

    @keyframes pulseLine {
      0%, 100% { opacity: 0.45; transform: scaleX(0.72); }
      50% { opacity: 1; transform: scaleX(1); }
    }

    @keyframes selectedPulse {
      0%, 100% { box-shadow: 0 16px 32px rgba(69, 104, 255, 0.32); }
      50% { box-shadow: 0 20px 42px rgba(255, 98, 178, 0.34); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes shine {
      from { background-position: 120% 0; }
      to { background-position: -120% 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
        place-items: stretch;
      }

      .app,
      .content {
        min-height: calc(100vh - 24px);
      }

      header {
        display: grid;
      }

      .status {
        justify-self: start;
      }

      .weather-grid {
        grid-template-columns: 1fr;
      }

      .condition {
        grid-template-columns: auto 1fr;
        justify-items: start;
        min-width: 0;
      }

      .emoji {
        font-size: 4.4rem;
      }

      .details {
        grid-template-columns: 1fr;
      }

      .city-tabs {
        gap: 7px;
      }

      button {
        min-height: 50px;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-label="今日の天気">
      <div class="sparkles" aria-hidden="true"></div>
      <div class="content" id="app">
        <header>
          <div>
            <h1>今日の天気</h1>
            <p class="subtitle">Open-Meteo APIから現在の気温と天気を取得します。</p>
          </div>
          <div class="status" id="status" aria-live="polite">取得中</div>
        </header>

        <div class="hero" aria-live="polite">
          <div class="place">
            <span class="pin" aria-hidden="true">⌖</span>
            <span id="cityName">高松</span>
          </div>

          <div class="weather-grid">
            <div class="temperature">
              <strong id="temperature">--</strong>
              <span>°C</span>
            </div>

            <div class="condition">
              <div class="emoji" id="weatherEmoji" aria-hidden="true">☀️</div>
              <div class="condition-name" id="weatherText">取得中</div>
            </div>
          </div>

          <div class="details">
            <div class="metric">
              <span>観測時刻</span>
              <strong id="observedAt">--</strong>
            </div>
            <div class="metric">
              <span>天気コード</span>
              <strong id="weatherCode">--</strong>
            </div>
            <div class="metric">
              <span>データ</span>
              <strong id="dataSource">Open-Meteo</strong>
            </div>
          </div>

          <div class="message" id="message"></div>
        </div>

        <nav class="city-tabs" aria-label="都市を切り替え">
          <button type="button" data-city="takamatsu" aria-pressed="true">高松</button>
          <button type="button" data-city="tokyo" aria-pressed="false">東京</button>
          <button type="button" data-city="osaka" aria-pressed="false">大阪</button>
        </nav>
      </div>
    </section>
  </main>

  <script>
    const cities = {
      takamatsu: {
        name: "高松",
        latitude: 34.34,
        longitude: 134.05,
        fallback: { temperature: 29, code: 1, time: "2026-07-04T12:00" }
      },
      tokyo: {
        name: "東京",
        latitude: 35.6895,
        longitude: 139.6917,
        fallback: { temperature: 30, code: 2, time: "2026-07-04T12:00" }
      },
      osaka: {
        name: "大阪",
        latitude: 34.6937,
        longitude: 135.5023,
        fallback: { temperature: 31, code: 3, time: "2026-07-04T12:00" }
      }
    };

    const weatherMap = new Map([
      [0, ["☀️", "晴れ"]],
      [1, ["🌤️", "晴れ時々くもり"]],
      [2, ["⛅", "一部くもり"]],
      [3, ["☁️", "くもり"]],
      [45, ["🌫️", "霧"]],
      [48, ["🌫️", "霧氷"]],
      [51, ["🌦️", "弱い霧雨"]],
      [53, ["🌦️", "霧雨"]],
      [55, ["🌧️", "強い霧雨"]],
      [56, ["🌧️", "凍る霧雨"]],
      [57, ["🌧️", "強い凍る霧雨"]],
      [61, ["🌧️", "弱い雨"]],
      [63, ["🌧️", "雨"]],
      [65, ["☔", "強い雨"]],
      [66, ["🌧️", "凍る雨"]],
      [67, ["☔", "強い凍る雨"]],
      [71, ["🌨️", "弱い雪"]],
      [73, ["🌨️", "雪"]],
      [75, ["❄️", "強い雪"]],
      [77, ["🌨️", "雪粒"]],
      [80, ["🌦️", "にわか雨"]],
      [81, ["🌧️", "にわか雨"]],
      [82, ["☔", "激しいにわか雨"]],
      [85, ["🌨️", "にわか雪"]],
      [86, ["❄️", "激しいにわか雪"]],
      [95, ["⛈️", "雷雨"]],
      [96, ["⛈️", "ひょうを伴う雷雨"]],
      [99, ["⛈️", "強いひょうを伴う雷雨"]]
    ]);

    const elements = {
      app: document.querySelector("#app"),
      sparkles: document.querySelector(".sparkles"),
      status: document.querySelector("#status"),
      cityName: document.querySelector("#cityName"),
      temperature: document.querySelector("#temperature"),
      weatherEmoji: document.querySelector("#weatherEmoji"),
      weatherText: document.querySelector("#weatherText"),
      observedAt: document.querySelector("#observedAt"),
      weatherCode: document.querySelector("#weatherCode"),
      dataSource: document.querySelector("#dataSource"),
      message: document.querySelector("#message"),
      buttons: document.querySelectorAll("[data-city]")
    };

    let activeRequest = null;
    let currentTemperature = 0;

    function buildSparkles() {
      const colors = ["#ffc94b", "#ff62b2", "#00a9e8", "#ffffff", "#21c997"];
      const fragment = document.createDocumentFragment();

      for (let i = 0; i < 34; i += 1) {
        const sparkle = document.createElement("span");
        sparkle.className = "sparkle";
        sparkle.style.setProperty("--x", `${Math.random() * 100}%`);
        sparkle.style.setProperty("--y", `${Math.random() * 100}%`);
        sparkle.style.setProperty("--size", `${6 + Math.random() * 14}px`);
        sparkle.style.setProperty("--dur", `${2.4 + Math.random() * 3.8}s`);
        sparkle.style.setProperty("--delay", `${Math.random() * 3.4}s`);
        sparkle.style.setProperty("--color", colors[i % colors.length]);
        fragment.appendChild(sparkle);
      }

      elements.sparkles.appendChild(fragment);
    }

    function getWeatherLabel(code) {
      return weatherMap.get(code) || ["🌡️", "不明"];
    }

    function formatTime(value) {
      if (!value) return "--";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZone: "Asia/Tokyo"
      }).format(new Date(value));
    }

    function setStatus(text, tone) {
      elements.status.textContent = text;
      if (tone) {
        elements.status.dataset.tone = tone;
      } else {
        delete elements.status.dataset.tone;
      }
    }

    function animateTemperature(toValue) {
      const fromValue = currentTemperature;
      const start = performance.now();
      const duration = 700;

      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const value = Math.round(fromValue + (toValue - fromValue) * eased);
        elements.temperature.textContent = String(value);

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          currentTemperature = toValue;
        }
      }

      requestAnimationFrame(tick);
    }

    function setLoading(city) {
      elements.app.classList.add("skeleton");
      elements.cityName.textContent = city.name;
      elements.temperature.textContent = "--";
      elements.weatherEmoji.textContent = "✨";
      elements.weatherText.textContent = "取得中";
      elements.observedAt.textContent = "--";
      elements.weatherCode.textContent = "--";
      elements.dataSource.textContent = "Open-Meteo";
      elements.message.textContent = "最新データを読み込んでいます。";
      setStatus("取得中", "");
    }

    function renderWeather(city, current, source) {
      const code = Number(current.weather_code);
      const temperature = Math.round(Number(current.temperature_2m));
      const [emoji, label] = getWeatherLabel(code);

      elements.app.classList.remove("skeleton");
      elements.cityName.textContent = city.name;
      animateTemperature(temperature);
      elements.weatherEmoji.textContent = emoji;
      elements.weatherText.textContent = label;
      elements.observedAt.textContent = formatTime(current.time);
      elements.weatherCode.textContent = String(code);

      if (source === "live") {
        elements.dataSource.textContent = "Open-Meteo";
        elements.message.textContent = `${city.name}の現在の天気です。`;
        setStatus("更新済み", "ok");
      } else {
        elements.dataSource.textContent = "サンプル";
        elements.message.textContent = "APIに接続できないため、画面確認用のサンプル値を表示しています。";
        setStatus("サンプル表示", "demo");
      }
    }

    function setActiveButton(cityKey) {
      elements.buttons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.city === cityKey));
      });
    }

    async function loadWeather(cityKey) {
      const city = cities[cityKey];
      setActiveButton(cityKey);
      setLoading(city);

      if (activeRequest) {
        activeRequest.abort();
      }

      activeRequest = new AbortController();
      const timeoutId = setTimeout(() => activeRequest.abort(), 9000);
      const params = new URLSearchParams({
        latitude: city.latitude,
        longitude: city.longitude,
        current: "temperature_2m,weather_code",
        timezone: "Asia/Tokyo"
      });

      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`, {
          signal: activeRequest.signal,
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderWeather(city, data.current, "live");
      } catch (error) {
        if (error.name === "AbortError" && activeRequest.signal.aborted) {
          renderWeather(city, {
            temperature_2m: city.fallback.temperature,
            weather_code: city.fallback.code,
            time: city.fallback.time
          }, "demo");
          return;
        }

        renderWeather(city, {
          temperature_2m: city.fallback.temperature,
          weather_code: city.fallback.code,
          time: city.fallback.time
        }, "demo");
      } finally {
        clearTimeout(timeoutId);
      }
    }

    elements.buttons.forEach((button) => {
      button.addEventListener("click", () => loadWeather(button.dataset.city));
