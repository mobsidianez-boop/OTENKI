<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>今日の天気</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #60708a;
      --glass: rgba(255, 255, 255, 0.74);
      --line: rgba(255, 255, 255, 0.78);
      --blue: #4568ff;
      --cyan: #00c8ff;
      --pink: #ff55c7;
      --violet: #8b5cff;
      --gold: #ffd44a;
      --green: #2ee6a6;
      --danger: #b33b63;
      --shadow: 0 34px 110px rgba(43, 57, 112, 0.25);
      color-scheme: light;
      font-family: "Inter", "Noto Sans JP", "Yu Gothic UI", "Hiragino Sans", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(255, 212, 74, 0.72), transparent 24%),
        radial-gradient(circle at 88% 16%, rgba(255, 85, 199, 0.54), transparent 23%),
        radial-gradient(circle at 82% 86%, rgba(0, 200, 255, 0.48), transparent 30%),
        radial-gradient(circle at 16% 84%, rgba(46, 230, 166, 0.38), transparent 26%),
        linear-gradient(135deg, #eafdff 0%, #fff3fe 44%, #fff9df 100%);
      display: grid;
      place-items: center;
      padding: 22px;
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: -45%;
      pointer-events: none;
    }

    body::before {
      background:
        conic-gradient(from 0deg, transparent, rgba(255, 255, 255, 0.74), transparent 15%),
        repeating-linear-gradient(95deg, transparent 0 40px, rgba(255,255,255,0.22) 41px 42px);
      animation: skySpin 26s linear infinite;
      opacity: 0.56;
    }

    body::after {
      background:
        radial-gradient(circle, rgba(255,255,255,0.92) 0 1px, transparent 2px) 0 0 / 46px 46px,
        radial-gradient(circle, rgba(255,255,255,0.72) 0 1px, transparent 2px) 18px 28px / 72px 72px;
      animation: starDrift 20s linear infinite;
      opacity: 0.62;
    }

    main {
      width: min(100%, 900px);
      position: relative;
      z-index: 1;
    }

    .app {
      position: relative;
      overflow: hidden;
      min-height: 710px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--glass);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.96);
      backdrop-filter: blur(24px) saturate(1.35);
      isolation: isolate;
    }

    .app::before,
    .app::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: -1;
    }

    .app::before {
      background:
        linear-gradient(115deg, rgba(255,255,255,0.96), rgba(255,255,255,0.32) 42%, rgba(0,200,255,0.2)),
        radial-gradient(circle at 22% 22%, rgba(255,255,255,0.96), transparent 17%),
        radial-gradient(circle at 82% 70%, rgba(255,85,199,0.24), transparent 26%),
        linear-gradient(90deg, rgba(69,104,255,0.08), transparent, rgba(255,212,74,0.12));
    }

    .app::after {
      width: 46%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.66), transparent);
      transform: skewX(-18deg) translateX(-160%);
      animation: sweep 4.8s ease-in-out infinite;
    }

    .rainbow-border {
      position: absolute;
      inset: 0;
      border-radius: 8px;
      padding: 2px;
      background: linear-gradient(135deg, var(--gold), var(--pink), var(--violet), var(--cyan), var(--green), var(--gold));
      background-size: 260% 260%;
      opacity: 0.72;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      pointer-events: none;
      animation: borderFlow 5.8s linear infinite;
      z-index: 2;
    }

    .sparkles,
    .shooting-stars,
    .glow-rings {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .sparkle {
      position: absolute;
      width: var(--size);
      height: var(--size);
      left: var(--x);
      top: var(--y);
      opacity: 0;
      animation: twinkle var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
      background: var(--color);
      filter: drop-shadow(0 0 10px var(--color)) drop-shadow(0 0 18px rgba(255,255,255,0.85));
    }

    .sparkle::before {
      width: 100%;
      height: 22%;
      border-radius: 999px;
    }

    .sparkle::after {
      width: 22%;
      height: 100%;
      border-radius: 999px;
    }

    .shooting-star {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: 160px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.98), var(--color));
      filter: drop-shadow(0 0 12px var(--color));
      transform: rotate(-24deg) translateX(-180px);
      opacity: 0;
      animation: shoot var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .glow-ring {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--size);
      height: var(--size);
      border: 1px solid rgba(255, 255, 255, 0.84);
      border-radius: 50%;
      box-shadow: 0 0 20px var(--color), inset 0 0 18px rgba(255,255,255,0.45);
      opacity: 0.32;
      animation: ringFloat var(--dur) ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .content {
      position: relative;
      z-index: 1;
      display: grid;
      min-height: 710px;
      grid-template-rows: auto 1fr auto;
      gap: 24px;
      padding: clamp(22px, 5vw, 50px);
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      animation: riseIn 650ms ease both;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.6rem, 4.4vw, 2.65rem);
      line-height: 1.1;
      letter-spacing: 0;
      text-shadow: 0 0 24px rgba(255,255,255,0.92);
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.7;
    }

    .status {
      min-width: 120px;
      border: 1px solid rgba(255,255,255,0.86);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 900;
      padding: 10px 14px;
      text-align: center;
      white-space: nowrap;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.4), 0 14px 32px rgba(69,104,255,0.16);
      animation: statusGlow 3s ease-in-out infinite;
    }

    .status[data-tone="ok"] {
      color: #116c4c;
      background: rgba(225, 255, 241, 0.86);
    }

    .status[data-tone="demo"] {
      color: #8a5a00;
      background: rgba(255, 247, 209, 0.88);
    }

    .status[data-tone="error"] {
      color: var(--danger);
      background: rgba(255, 231, 241, 0.88);
    }

    .hero {
      display: grid;
      align-content: center;
      gap: 24px;
      padding: 6px 0;
    }

    .place {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: clamp(1rem, 2.8vw, 1.2rem);
      font-weight: 900;
      animation: riseIn 720ms 80ms ease both;
    }

    .pin {
      display: inline-grid;
      place-items: center;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fff, #e5fbff 50%, #fff4cf);
      color: var(--blue);
      box-shadow: 0 0 22px rgba(0, 200, 255, 0.35), 0 12px 24px rgba(0, 169, 232, 0.2);
      animation: bob 2.7s ease-in-out infinite, pinSpark 2.2s ease-in-out infinite;
    }

    .weather-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 22px;
    }

    .temperature {
      display: flex;
      align-items: start;
      gap: 8px;
      min-width: 0;
      animation: riseIn 820ms 150ms ease both;
    }

    .temperature-wrap {
      display: grid;
      gap: 8px;
      min-width: 0;
    }

    .temperature-label {
      justify-self: start;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 999px;
      background: rgba(255,255,255,0.62);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 950;
      padding: 7px 11px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 22px rgba(69,104,255,0.08);
    }

    .temperature strong {
      font-size: clamp(5.9rem, 20vw, 10.8rem);
      line-height: 0.84;
      letter-spacing: 0;
      background: linear-gradient(120deg, #182033 0%, #4568ff 24%, #ff55c7 52%, #ffd44a 76%, #00c8ff 100%);
      background-size: 260% 260%;
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      animation: tempGlow 3.2s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(255,255,255,0.75)) drop-shadow(0 18px 22px rgba(69, 104, 255, 0.16));
    }

    .temperature span {
      margin-top: clamp(10px, 2.8vw, 20px);
      color: var(--muted);
      font-size: clamp(1.35rem, 4vw, 2.15rem);
      font-weight: 950;
    }

    .condition {
      display: grid;
      justify-items: center;
      gap: 10px;
      min-width: 164px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.86);
      border-radius: 8px;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.9), rgba(255,255,255,0.44)),
        radial-gradient(circle at 25% 20%, rgba(255,212,74,0.24), transparent 42%);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.35), 0 22px 46px rgba(69,104,255,0.16), inset 0 1px 0 rgba(255,255,255,0.95);
      animation: floatCard 3.5s ease-in-out infinite, riseIn 760ms 230ms ease both, cardGlow 2.8s ease-in-out infinite;
    }

    .emoji {
      font-size: clamp(4.7rem, 12vw, 7.2rem);
      line-height: 1;
      filter: drop-shadow(0 0 18px rgba(255, 212, 74, 0.72)) drop-shadow(0 14px 18px rgba(255, 85, 199, 0.2));
      animation: emojiDance 2.4s ease-in-out infinite;
    }

    .condition-name {
      color: var(--ink);
      font-size: clamp(1.25rem, 4vw, 1.9rem);
      font-weight: 950;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      animation: riseIn 860ms 320ms ease both;
    }

    .metric {
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.74);
      border-radius: 8px;
      padding: 14px;
      min-width: 0;
      background: rgba(255,255,255,0.54);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 14px 30px rgba(69,104,255,0.08);
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0 36%, rgba(255,255,255,0.58) 48%, transparent 62% 100%);
      transform: translateX(-120%);
      animation: miniSweep 3.6s ease-in-out infinite;
    }

    .metric::after {
      content: "";
      position: absolute;
      inset: auto 12px 0;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--gold), var(--green));
      background-size: 220% 100%;
      animation: rainbowLine 3.8s linear infinite, pulseLine 1.8s ease-in-out infinite;
    }

    .metric span,
    .metric strong {
      position: relative;
      z-index: 1;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: clamp(1rem, 3vw, 1.2rem);
      line-height: 1.35;
    }

    .city-tabs,
    .secret-panel {
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.5);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 16px 40px rgba(69,104,255,0.08);
      animation: riseIn 900ms 420ms ease both;
    }

    .city-tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 8px;
    }

    .secret-panel {
      display: grid;
      gap: 12px;
      padding: 14px;
    }

    .secret-copy {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.6;
    }

    .secret-form,
    .search-form {
      display: grid;
      gap: 10px;
    }

    .secret-form {
      grid-template-columns: 1fr auto;
    }

    .search-form {
      grid-template-columns: 1fr auto;
    }

    .secret-panel input {
      min-height: 50px;
      border: 1px solid rgba(69,104,255,0.18);
      border-radius: 7px;
      background: rgba(255,255,255,0.82);
      color: var(--ink);
      font: inherit;
      font-weight: 900;
      padding: 0 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .secret-panel input:focus {
      outline: 3px solid rgba(0, 200, 255, 0.28);
      border-color: rgba(69,104,255,0.42);
    }

    .advanced {
      display: none;
      gap: 10px;
    }

    .advanced.unlocked {
      display: grid;
    }

    .secret-feedback {
      min-height: 22px;
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 900;
    }

    .secret-feedback.error {
      color: var(--danger);
    }

    button {
      min-height: 54px;
      border: 0;
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      font: inherit;
      font-weight: 950;
      cursor: pointer;
      transition: background 180ms ease, color 180ms ease, box-shadow 180ms ease, transform 180ms ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.78);
      color: var(--blue);
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(255,255,255,0.9);
    }

    button:focus-visible {
      outline: 3px solid rgba(69, 104, 255, 0.32);
      outline-offset: 3px;
    }

    button[aria-pressed="true"],
    .primary-button {
      background: linear-gradient(135deg, var(--blue), var(--cyan) 36%, var(--pink) 70%, var(--gold));
      background-size: 220% 220%;
      color: #ffffff;
      box-shadow: 0 0 28px rgba(0,200,255,0.35), 0 20px 42px rgba(255, 85, 199, 0.28);
      animation: selectedPulse 2.1s ease-in-out infinite, buttonShimmer 3.2s linear infinite;
    }

    button:active {
      transform: translateY(1px);
    }

    .message {
      min-height: 28px;
      color: var(--muted);
      font-size: 0.94rem;
      font-weight: 800;
      line-height: 1.6;
      animation: fadeIn 400ms ease both;
    }

    .forecast {
      display: grid;
      gap: 12px;
      animation: riseIn 900ms 380ms ease both;
    }

    .forecast-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink);
      font-size: clamp(1rem, 3vw, 1.2rem);
      font-weight: 950;
    }

    .forecast-title span:last-child {
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 900;
    }

    .forecast-list {
      display: grid;
      grid-template-columns: repeat(7, minmax(72px, 1fr));
      gap: 8px;
    }

    .forecast-day {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 7px;
      background: rgba(255,255,255,0.52);
      color: var(--muted);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 10px 22px rgba(69,104,255,0.08);
      font-size: 0.82rem;
      font-weight: 950;
      white-space: nowrap;
    }

    .forecast-day[aria-pressed="true"] {
      background: linear-gradient(135deg, var(--blue), var(--cyan) 38%, var(--pink) 72%, var(--gold));
      background-size: 220% 220%;
      color: #fff;
      box-shadow: 0 0 22px rgba(0,200,255,0.34), 0 16px 34px rgba(255,85,199,0.2);
      animation: selectedPulse 2.1s ease-in-out infinite, buttonShimmer 3.2s linear infinite;
    }

    .forecast-detail {
      min-height: 156px;
    }

    .forecast-card {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: center;
      gap: 10px 16px;
      min-width: 0;
      border: 1px solid rgba(255,255,255,0.76);
      border-radius: 8px;
      padding: 18px;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.78), rgba(255,255,255,0.42)),
        radial-gradient(circle at 35% 20%, rgba(255,212,74,0.22), transparent 46%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 14px 28px rgba(69,104,255,0.09);
    }

    .forecast-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0 35%, rgba(255,255,255,0.58) 49%, transparent 64% 100%);
      transform: translateX(-120%);
      animation: miniSweep 4.2s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .forecast-card > * {
      position: relative;
      z-index: 1;
    }

    .forecast-date {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 950;
      white-space: nowrap;
    }

    .forecast-emoji {
      font-size: 3.4rem;
      line-height: 1;
      filter: drop-shadow(0 0 10px rgba(255,255,255,0.9));
    }

    .forecast-weather {
      color: var(--ink);
      font-size: clamp(1.1rem, 3vw, 1.45rem);
      font-weight: 950;
      line-height: 1.3;
    }

    .forecast-temp {
      display: flex;
      align-items: baseline;
      gap: 6px;
      color: var(--ink);
      font-weight: 950;
      flex-wrap: wrap;
    }

    .forecast-temp strong {
      font-size: clamp(1.5rem, 4vw, 2rem);
    }

    .forecast-temp span {
      color: var(--muted);
      font-size: 1rem;
      font-weight: 900;
    }

    .forecast-mean {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      border: 1px solid rgba(69,104,255,0.14);
      border-radius: 999px;
      background: rgba(255,255,255,0.6);
      color: var(--blue);
      font-size: 0.9rem;
      font-weight: 950;
      padding: 5px 9px;
      margin-top: 6px;
    }

    .forecast-rain {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 900;
    }

    .hourly {
      display: grid;
      gap: 10px;
    }

    .hourly-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink);
      font-size: 0.95rem;
      font-weight: 950;
    }

    .hourly-title span:last-child {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .hourly-list {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      -webkit-overflow-scrolling: touch;
      padding: 2px 6px 12px 2px;
      scroll-snap-type: x proximity;
      scroll-padding-inline: 2px;
      scrollbar-width: thin;
      mask-image: linear-gradient(90deg, #000 0 calc(100% - 34px), transparent 100%);
      -webkit-mask-image: linear-gradient(90deg, #000 0 calc(100% - 34px), transparent 100%);
    }

    .hourly-list::-webkit-scrollbar {
      height: 8px;
    }

    .hourly-list::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.38);
      border-radius: 999px;
    }

    .hourly-list::-webkit-scrollbar-thumb {
      background: linear-gradient(90deg, var(--cyan), var(--pink), var(--gold));
      border-radius: 999px;
    }

    .hourly-card {
      position: relative;
      overflow: hidden;
      flex: 0 0 92px;
      display: grid;
      justify-items: center;
      gap: 6px;
      min-height: 118px;
      border: 1px solid rgba(255,255,255,0.74);
      border-radius: 8px;
      padding: 10px 8px;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.7), rgba(255,255,255,0.4)),
        radial-gradient(circle at 35% 18%, rgba(0,200,255,0.18), transparent 46%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 12px 24px rgba(69,104,255,0.08);
      scroll-snap-align: start;
    }

    .hourly-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 0 34%, rgba(255,255,255,0.5) 50%, transparent 66% 100%);
      transform: translateX(-120%);
      animation: miniSweep 4.6s ease-in-out infinite;
      animation-delay: var(--delay, 0s);
    }

    .hourly-card > * {
      position: relative;
      z-index: 1;
    }

    .hourly-time {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 950;
    }

    .hourly-emoji {
      font-size: 1.7rem;
      line-height: 1;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.9));
    }

    .hourly-temp {
      color: var(--ink);
      font-size: 1.06rem;
      font-weight: 950;
    }

    .hourly-rain {
      color: var(--muted);
      font-size: 0.75rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .sky-watch {
      display: grid;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      background: rgba(255,255,255,0.5);
      padding: 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.9), 0 16px 40px rgba(69,104,255,0.08);
      animation: riseIn 900ms 460ms ease both;
    }

    .sky-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: var(--ink);
      font-size: clamp(1rem, 3vw, 1.18rem);
      font-weight: 950;
    }

    .sky-title span:last-child {
      color: var(--muted);
      font-size: 0.76rem;
      font-weight: 900;
    }

    .sky-camera {
      position: relative;
      overflow: hidden;
      display: grid;
      place-items: center;
      min-height: 180px;
      border: 1px solid rgba(255,255,255,0.78);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(229,251,255,0.85), rgba(255,244,252,0.7)),
        radial-gradient(circle at 25% 20%, rgba(255,255,255,0.8), transparent 34%);
    }

    .sky-camera video {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      display: none;
    }

    .sky-camera.active video {
      display: block;
    }

    .sky-placeholder {
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 900;
      padding: 18px;
      text-align: center;
      line-height: 1.6;
    }

    .sky-camera.active .sky-placeholder {
      display: none;
    }

    .sky-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .sky-result {
      min-height: 90px;
      border: 1px solid rgba(255,255,255,0.72);
      border-radius: 8px;
      background: rgba(255,255,255,0.54);
      color: var(--ink);
      padding: 12px;
      font-size: 0.92rem;
      font-weight: 850;
      line-height: 1.65;
    }

    .sky-result strong {
      display: block;
      margin-bottom: 4px;
      font-size: 1.02rem;
      font-weight: 950;
    }

    .sky-preview {
      display: block;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border: 1px solid rgba(255,255,255,0.84);
      border-radius: 8px;
      margin: 0 0 10px;
      box-shadow: 0 10px 28px rgba(24,45,98,0.14), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .skeleton .temperature strong,
    .skeleton .condition,
    .skeleton .metric strong,
    .skeleton .forecast-card,
    .skeleton .hourly-card {
      color: transparent;
      background: linear-gradient(90deg, rgba(255,255,255,0.3), rgba(255,255,255,0.96), rgba(255,255,255,0.3));
      background-size: 240% 100%;
      animation: shine 1.1s ease-in-out infinite;
    }

    .skeleton .temperature strong {
      border-radius: 8px;
    }

    @keyframes skySpin { to { transform: rotate(360deg); } }
    @keyframes starDrift { to { transform: translate3d(90px, 70px, 0); } }
    @keyframes borderFlow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes sweep { 0%, 35% { transform: skewX(-18deg) translateX(-160%); } 62%, 100% { transform: skewX(-18deg) translateX(260%); } }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.35) rotate(0deg); }
      32% { opacity: 0.72; transform: scale(1.15) rotate(120deg); }
      52% { opacity: 1; transform: scale(1.55) rotate(220deg); }
      72% { opacity: 0.58; transform: scale(0.95) rotate(300deg); }
    }
    @keyframes shoot {
      0%, 68% { opacity: 0; transform: rotate(-24deg) translateX(-180px); }
      76% { opacity: 0.96; }
      100% { opacity: 0; transform: rotate(-24deg) translateX(760px); }
    }
    @keyframes ringFloat {
      0%, 100% { transform: translate3d(0, 0, 0) scale(0.88); opacity: 0.18; }
      50% { transform: translate3d(18px, -24px, 0) scale(1.12); opacity: 0.42; }
    }
    @keyframes riseIn { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes pinSpark { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.18); } }
    @keyframes tempGlow { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
    @keyframes emojiDance { 0%, 100% { transform: rotate(-4deg) scale(1); } 50% { transform: rotate(5deg) scale(1.1); } }
    @keyframes floatCard { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    @keyframes cardGlow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.35), 0 22px 46px rgba(69,104,255,0.16); }
      50% { box-shadow: 0 0 24px rgba(255,212,74,0.42), 0 24px 50px rgba(255,85,199,0.2); }
    }
    @keyframes miniSweep { 0%, 48% { transform: translateX(-120%); } 78%, 100% { transform: translateX(120%); } }
    @keyframes pulseLine { 0%, 100% { opacity: 0.46; transform: scaleX(0.7); } 50% { opacity: 1; transform: scaleX(1); } }
    @keyframes rainbowLine { to { background-position: 220% 50%; } }
    @keyframes selectedPulse {
      0%, 100% { box-shadow: 0 0 28px rgba(0,200,255,0.35), 0 20px 42px rgba(255, 85, 199, 0.28); }
      50% { box-shadow: 0 0 34px rgba(255,212,74,0.55), 0 24px 52px rgba(69, 104, 255, 0.32); }
    }
    @keyframes buttonShimmer { to { background-position: 200% 50%; } }
    @keyframes statusGlow {
      0%, 100% { box-shadow: 0 0 0 1px rgba(255,255,255,0.4), 0 14px 32px rgba(69,104,255,0.16); }
      50% { box-shadow: 0 0 26px rgba(255,255,255,0.85), 0 18px 42px rgba(255,85,199,0.16); }
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes shine { from { background-position: 120% 0; } to { background-position: -120% 0; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 720px) {
      body {
        padding: 12px;
        place-items: stretch;
        background:
          radial-gradient(circle at 14% 10%, rgba(255, 212, 74, 0.45), transparent 24%),
          radial-gradient(circle at 86% 12%, rgba(255, 85, 199, 0.34), transparent 24%),
          linear-gradient(135deg, #eafdff 0%, #fff3fe 54%, #fff9df 100%);
      }

      body::before,
      body::after,
      .app::after,
      .shooting-stars,
      .glow-rings {
        display: none;
      }

      .app {
        overflow: visible;
        background: rgba(255,255,255,0.82);
        box-shadow: 0 18px 46px rgba(43,57,112,0.14), inset 0 1px 0 rgba(255,255,255,0.96);
        backdrop-filter: none;
      }

      .rainbow-border,
      .sparkle,
      header,
      .place,
      .temperature,
      .details,
      .city-tabs,
      .secret-panel,
      .forecast,
      .sky-watch,
      .status,
      .pin,
      .temperature strong,
      .condition,
      .emoji,
      .metric::before,
      .forecast-card::before,
      .hourly-card::before,
      button[aria-pressed="true"],
      .primary-button {
        animation: none !important;
      }

      .metric::after {
        animation: rainbowLine 4.8s linear infinite !important;
      }

      button[aria-pressed="true"],
      .primary-button {
        animation: buttonShimmer 4.8s linear infinite !important;
      }

      .sparkle:nth-child(n+13) {
        display: none;
      }

      .temperature strong,
      .emoji,
      .hourly-emoji {
        filter: none;
      }

      .app,
      .content {
        min-height: 0;
      }

      header {
        display: grid;
      }

      .status {
        justify-self: start;
      }

      .weather-grid {
        grid-template-columns: 1fr;
      }

      .condition {
        grid-template-columns: auto 1fr;
        justify-items: start;
        min-width: 0;
      }

      .emoji {
        font-size: 4.4rem;
      }

      .details {
        grid-template-columns: 1fr 1fr;
      }

      .forecast-list {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .forecast-card {
        grid-template-columns: auto 1fr;
      }

      .city-tabs,
      .secret-form,
      .search-form,
      .sky-actions {
        grid-template-columns: 1fr;
      }

      button {
        min-height: 50px;
        font-size: 0.95rem;
      }

      .skeleton .temperature strong,
      .skeleton .condition,
      .skeleton .metric strong,
      .skeleton .forecast-card,
      .skeleton .hourly-card {
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app" aria-label="今日の天気">
      <div class="rainbow-border" aria-hidden="true"></div>
      <div class="sparkles" aria-hidden="true"></div>
      <div class="shooting-stars" aria-hidden="true"></div>
      <div class="glow-rings" aria-hidden="true"></div>

      <div class="content" id="app">
        <header>
          <div>
            <h1>今日の天気</h1>
            <p class="subtitle">通常モードは誰でも見られます。合言葉で好きな場所検索と空ウォッチが開きます。</p>
          </div>
          <div class="status" id="status" aria-live="polite">取得中</div>
        </header>

        <div class="hero" aria-live="polite">
          <div class="place">
            <span class="pin" aria-hidden="true">⌖</span>
            <span id="cityName">高松</span>
          </div>

          <div class="weather-grid">
            <div class="temperature-wrap">
              <div class="temperature-label">現在の気温</div>
              <div class="temperature">
                <strong id="temperature">--</strong>
                <span>°C</span>
              </div>
            </div>

            <div class="condition">
              <div class="emoji" id="weatherEmoji" aria-hidden="true">☀️</div>
              <div class="condition-name" id="weatherText">取得中</div>
            </div>
          </div>

          <div class="details">
            <div class="metric">
              <span>湿度</span>
              <strong id="humidity">--</strong>
            </div>
            <div class="metric">
              <span>観測時刻</span>
              <strong id="observedAt">--</strong>
            </div>
            <div class="metric">
              <span>天気コード</span>
              <strong id="weatherCode">--</strong>
            </div>
            <div class="metric">
              <span>データ</span>
              <strong id="dataSource">Open-Meteo</strong>
            </div>
          </div>

          <div class="message" id="message"></div>

          <section class="forecast" aria-label="今後一週間の天気">
            <div class="forecast-title">
              <span>7日間予報</span>
              <span>日付を選択</span>
            </div>
            <div class="forecast-list" id="forecastList"></div>
            <div class="forecast-detail" id="forecastDetail"></div>
            <section class="hourly" aria-label="一時間ごとの天気">
              <div class="hourly-title">
                <span>1時間ごとの予報</span>
                <span>横スクロール</span>
              </div>
              <div class="hourly-list" id="hourlyList"></div>
            </section>
          </section>

        </div>

        <nav class="city-tabs" aria-label="都市を切り替え">
          <button type="button" data-city="takamatsu" aria-pressed="true">高松</button>
          <button type="button" data-city="tokyo" aria-pressed="false">東京</button>
          <button type="button" data-city="osaka" aria-pressed="false">大阪</button>
        </nav>

        <section class="secret-panel" aria-label="合言葉エリア">
          <div class="secret-copy">合言葉を入れると、都市名や地名を指定した天気検索と、カメラで雲を読む空ウォッチが使えます。</div>
          <form class="secret-form" id="secretForm" autocomplete="off">
            <input id="passphrase" name="passphrase" type="password" placeholder="合言葉" autocomplete="current-password">
            <button class="primary-button" type="submit">拡張モードを開く</button>
          </form>
          <div class="advanced" id="advanced">
            <form class="search-form" id="searchForm">
              <input id="placeSearch" type="search" placeholder="例: 札幌、京都、New York">
              <button class="primary-button" type="submit">この場所を見る</button>
            </form>
            <section class="sky-watch" aria-label="空ウォッチ">
              <div class="sky-title">
                <span>空ウォッチ</span>
                <span>カメラで雲を推定</span>
              </div>
              <div class="sky-camera" id="skyCamera">
                <video id="skyVideo" playsinline webkit-playsinline autoplay muted></video>
                <div class="sky-placeholder">空にカメラを向けると、雲の量や暗さから「どんな雲っぽいか」をざっくり見ます。</div>
              </div>
              <canvas id="skyCanvas" width="96" height="72" hidden></canvas>
              <div class="sky-actions">
                <button class="primary-button" type="button" id="startSkyCamera">カメラ開始</button>
                <button class="primary-button" type="button" id="analyzeSky">雲を見てみる</button>
                <button class="primary-button" type="button" id="useCurrentLocation">現在地で見る</button>
              </div>
              <div class="sky-result" id="skyResult">まだ解析していません。空が画面に大きく入るようにしてから押してください。</div>
            </section>
          </div>
          <div class="secret-feedback" id="secretFeedback" aria-live="polite"></div>
        </section>
      </div>
    </section>
  </main>

  <script>
    const cities = {
      takamatsu: {
        name: "高松",
        latitude: 34.34,
        longitude: 134.05,
        fallback: { temperature: 29, humidity: 68, code: 1, time: "2026-07-04T12:00" }
      },

      },

        latitude: 34.6937,
        longitude: 135.5023,
        fallback: { temperature: 31, humidity: 66, code: 3, time: "2026-07-04T12:00" }
      }
    };

    const weatherMap = new Map([
      [0, ["☀️", "晴れ"]],
      [1, ["🌤️", "晴れ時々くもり"]],
      [2, ["⛅", "一部くもり"]],
      [3, ["☁️", "くもり"]],
      [45, ["🌫️", "霧"]],
      [48, ["🌫️", "霧氷"]],
      [51, ["🌦️", "弱い霧雨"]],
      [53, ["🌦️", "霧雨"]],
      [55, ["🌧️", "強い霧雨"]],
      [56, ["🌧️", "凍る霧雨"]],
      [57, ["🌧️", "強い凍る霧雨"]],
      [61, ["🌧️", "弱い雨"]],
      [63, ["🌧️", "雨"]],
      [65, ["☔", "強い雨"]],
      [66, ["🌧️", "凍る雨"]],
      [67, ["☔", "強い凍る雨"]],
      [71, ["🌨️", "弱い雪"]],
      [73, ["🌨️", "雪"]],
      [75, ["❄️", "強い雪"]],
      [77, ["🌨️", "雪粒"]],
      [80, ["🌦️", "にわか雨"]],
      [81, ["🌧️", "にわか雨"]],
      [82, ["☔", "激しいにわか雨"]],
      [85, ["🌨️", "にわか雪"]],
      [86, ["❄️", "激しいにわか雪"]],
      [95, ["⛈️", "雷雨"]],
      [96, ["⛈️", "ひょうを伴う雷雨"]],
      [99, ["⛈️", "強いひょうを伴う雷雨"]]
    ]);

    const elements = {
      app: document.querySelector("#app"),
      sparkles: document.querySelector(".sparkles"),
      shootingStars: document.querySelector(".shooting-stars"),
      glowRings: document.querySelector(".glow-rings"),
      status: document.querySelector("#status"),
      cityName: document.querySelector("#cityName"),
      temperature: document.querySelector("#temperature"),
      humidity: document.querySelector("#humidity"),
      weatherEmoji: document.querySelector("#weatherEmoji"),
      weatherText: document.querySelector("#weatherText"),
      observedAt: document.querySelector("#observedAt"),
      weatherCode: document.querySelector("#weatherCode"),
      dataSource: document.querySelector("#dataSource"),
      message: document.querySelector("#message"),
      forecastList: document.querySelector("#forecastList"),
      forecastDetail: document.querySelector("#forecastDetail"),
      hourlyList: document.querySelector("#hourlyList"),
      skyCamera: document.querySelector("#skyCamera"),
      skyVideo: document.querySelector("#skyVideo"),
      skyCanvas: document.querySelector("#skyCanvas"),
      startSkyCamera: document.querySelector("#startSkyCamera"),
      analyzeSky: document.querySelector("#analyzeSky"),
      useCurrentLocation: document.querySelector("#useCurrentLocation"),
      skyResult: document.querySelector("#skyResult"),
      buttons: document.querySelectorAll("[data-city]"),
      secretForm: document.querySelector("#secretForm"),
      passphrase: document.querySelector("#passphrase"),
      advanced: document.querySelector("#advanced"),
      secretFeedback: document.querySelector("#secretFeedback"),
      searchForm: document.querySelector("#searchForm"),
      placeSearch: document.querySelector("#placeSearch")
    };

    let activeRequest = null;
    let currentTemperature = 0;
    let advancedUnlocked = sessionStorage.getItem("otenki-advanced") === "yes";
    let selectedForecastIndex = 0;
    let activeDailyForecast = null;
    let activeHourlyForecast = null;
    const lightweightMode = window.matchMedia("(max-width: 720px), (prefers-reduced-motion: reduce)").matches;
    let skyStream = null;
    let currentWeatherContext = { humidity: null, label: "", rain: null, cityName: "", windSpeed: null, windDirection: null, pressure: null };

    const passConfig = {
      salt: "OTENKI:v2:advanced-weather",
      iterations: 420000,
      hash: "s+TZZMjKjpOayhMFgYvxNnBWNBIdTNpHlDPjfxHvgo8="
    };

    function bytesToBase64(bytes) {
      let value = "";
      bytes.forEach((byte) => {
        value += String.fromCharCode(byte);
      });
      return btoa(value);
    }

    async function hashPassphrase(passphrase) {
      const encoder = new TextEncoder();
      const keyMaterial = await crypto.subtle.importKey("raw", encoder.encode(passphrase), "PBKDF2", false, ["deriveBits"]);
      const derived = await crypto.subtle.deriveBits({
        name: "PBKDF2",
        salt: encoder.encode(passConfig.salt),
        iterations: passConfig.iterations,
        hash: "SHA-256"
      }, keyMaterial, 256);
      return bytesToBase64(new Uint8Array(derived));
    }

    function timingSafeEqual(a, b) {
      if (a.length !== b.length) return false;
      let result = 0;
      for (let i = 0; i < a.length; i += 1) {
        result |= a.charCodeAt(i) ^ b.charCodeAt(i);
      }
      return result === 0;
    }

    function buildEffects() {
      const colors = ["#ffd44a", "#ff55c7", "#00c8ff", "#ffffff", "#2ee6a6", "#8b5cff"];
      const sparkleFragment = document.createDocumentFragment();
      const shootingFragment = document.createDocumentFragment();
      const ringFragment = document.createDocumentFragment();
      const sparkleCount = lightweightMode ? 12 : 70;
      const shootingCount = lightweightMode ? 0 : 7;
      const ringCount = lightweightMode ? 0 : 8;

      for (let i = 0; i < sparkleCount; i += 1) {
        const sparkle = document.createElement("span");
        sparkle.className = "sparkle";
        sparkle.style.setProperty("--x", `${Math.random() * 100}%`);
        sparkle.style.setProperty("--y", `${Math.random() * 100}%`);
        sparkle.style.setProperty("--size", `${7 + Math.random() * 17}px`);
        sparkle.style.setProperty("--dur", `${1.8 + Math.random() * 3.6}s`);
        sparkle.style.setProperty("--delay", `${Math.random() * 3.8}s`);
        sparkle.style.setProperty("--color", colors[i % colors.length]);
        sparkleFragment.appendChild(sparkle);
      }

      for (let i = 0; i < shootingCount; i += 1) {
        const star = document.createElement("span");
        star.className = "shooting-star";
        star.style.setProperty("--x", `${-12 + Math.random() * 52}%`);
        star.style.setProperty("--y", `${6 + Math.random() * 68}%`);
        star.style.setProperty("--dur", `${5.2 + Math.random() * 5.4}s`);
        star.style.setProperty("--delay", `${1.2 + i * 1.7}s`);
        star.style.setProperty("--color", colors[(i + 2) % colors.length]);
        shootingFragment.appendChild(star);
      }

      for (let i = 0; i < ringCount; i += 1) {
        const ring = document.createElement("span");
        ring.className = "glow-ring";
        ring.style.setProperty("--x", `${Math.random() * 92}%`);
        ring.style.setProperty("--y", `${Math.random() * 86}%`);
        ring.style.setProperty("--size", `${48 + Math.random() * 90}px`);
        ring.style.setProperty("--dur", `${4.4 + Math.random() * 4.8}s`);
        ring.style.setProperty("--delay", `${Math.random() * 4}s`);
        ring.style.setProperty("--color", colors[(i + 1) % colors.length]);
        ringFragment.appendChild(ring);
      }

      elements.sparkles.appendChild(sparkleFragment);
      elements.shootingStars.appendChild(shootingFragment);
      elements.glowRings.appendChild(ringFragment);
    }

    function getWeatherLabel(code) {
      return weatherMap.get(code) || ["🌡️", "不明"];
    }

    function formatTime(value) {
      if (!value) return "--";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
        timeZone: "Asia/Tokyo"
      }).format(new Date(value));
    }

    function formatForecastDate(value, index) {
      if (!value) return "--";
      const label = new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        weekday: "short",
        timeZone: "Asia/Tokyo"
      }).format(new Date(`${value}T00:00:00+09:00`));
      return index === 0 ? `今日 ${label}` : label;
    }

    function formatForecastTab(value, index) {
      if (index === 0) return "今日";
      if (index === 1) return "明日";
      if (!value) return "--";
      return new Intl.DateTimeFormat("ja-JP", {
        month: "numeric",
        day: "numeric",
        timeZone: "Asia/Tokyo"
      }).format(new Date(`${value}T00:00:00+09:00`));
    }

    function setStatus(text, tone) {
      elements.status.textContent = text;
      if (tone) {
        elements.status.dataset.tone = tone;
      } else {
        delete elements.status.dataset.tone;
      }
    }

    function animateTemperature(toValue) {
      if (lightweightMode) {
        currentTemperature = toValue;
        elements.temperature.textContent = String(toValue);
        return;
      }

      const fromValue = currentTemperature;
      const start = performance.now();
      const duration = 700;

      function tick(now) {
        const progress = Math.min((now - start) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const value = Math.round(fromValue + (toValue - fromValue) * eased);
        elements.temperature.textContent = String(value);

        if (progress < 1) {
          requestAnimationFrame(tick);
        } else {
          currentTemperature = toValue;
        }
      }

      requestAnimationFrame(tick);
    }

    function buildFallbackDaily(seed) {
      const start = new Date(`${seed.time.slice(0, 10)}T00:00:00+09:00`);
      const times = [];
      const codes = [];
      const highs = [];
      const lows = [];
      const means = [];
      const rain = [];

      for (let i = 0; i < 7; i += 1) {
        const date = new Date(start);
        date.setDate(start.getDate() + i);
        times.push(date.toISOString().slice(0, 10));
        codes.push([seed.code, 1, 2, 3, 61, 80, 0][i % 7]);
        highs.push(seed.temperature + (i % 3) - 1);
        lows.push(seed.temperature - 5 - (i % 2));
        means.push(seed.temperature - 2 + (i % 2));
        rain.push([10, 20, 30, 45, 55, 35, 15][i]);
      }

      return {
        time: times,
        weather_code: codes,
        temperature_2m_max: highs,
        temperature_2m_min: lows,
        temperature_2m_mean: means,
        precipitation_probability_max: rain
      };
    }

    function buildFallbackHourly(seed) {
      const start = new Date(`${seed.time.slice(0, 10)}T00:00:00+09:00`);
      const times = [];
      const codes = [];
      const temps = [];
      const rain = [];

      for (let day = 0; day < 7; day += 1) {
        for (let hour = 0; hour < 24; hour += 1) {
          const date = new Date(start);
          date.setDate(start.getDate() + day);
          date.setHours(hour, 0, 0, 0);
          times.push(date.toISOString().slice(0, 16));
          codes.push([seed.code, 1, 2, 3, 61, 80][(day + Math.floor(hour / 4)) % 6]);
          temps.push(seed.temperature + Math.round(Math.sin((hour - 7) / 24 * Math.PI * 2) * 3) + (day % 3) - 1);
          rain.push([10, 15, 20, 35, 55, 75, 45, 25][(day + Math.floor(hour / 3)) % 8]);
        }
      }

      return {
        time: times,
        weather_code: codes,
        temperature_2m: temps,
        precipitation_probability: rain
      };
    }

    function formatHour(value) {
      if (!value) return "--:--";
      return new Intl.DateTimeFormat("ja-JP", {

        timeZone: "Asia/Tokyo"
      }).format(new Date(value));

    function getSelectedRainChance() {

    function windDirectionLabel(degrees) {
      if (!Number.isFinite(Number(degrees))) return "不明";
      const labels = ["北", "北東", "東", "南東", "南", "南西", "西", "北西"];
      return labels[Math.round(Number(degrees) / 45) % 8];

    function describeSkyTrend(cloudType, stats) {
      const humidity = currentWeatherContext.humidity;
      const rainChance = getSelectedRainChance();
      const windSpeed = currentWeatherContext.windSpeed;
      const windDirection = currentWeatherContext.windDirection;
      const pressure = currentWeatherContext.pressure;
      const wet = Number.isFinite(humidity) && humidity >= 75;
      const rainy = Number.isFinite(rainChance) && rainChance >= 55;
      const windy = Number.isFinite(windSpeed) && windSpeed >= 7;
      const lowPressure = Number.isFinite(pressure) && pressure < 1008;
      const windText = Number.isFinite(windSpeed)
        ? `風は${windDirectionLabel(windDirection)}から約${Math.round(windSpeed)}km/h`
        : "風向きはまだ取得中";

      if (cloudType.key === "cumulonimbus" || ((wet || rainy || lowPressure) && stats.darkRatio > 0.16)) {
        return `${windText}。雨に変わるサインかも。`;
      }
      if (cloudType.key === "stratus" || cloudType.key === "altostratus") {
        return `${windText}。日差しは弱め、変化はゆっくり。`;
      }
      if (cloudType.key === "cumulus") {
        return `${windText}。育つとにわか雨、低いままなら晴れ間あり。`;
      }
      if (cloudType.key === "white-cloud") {
        return `${windText}。白雲中心で、すぐ大雨の感じは弱め。`;
      }
      if (cloudType.key === "cirrus") {
        return `${windText}。天気の変わり目の前ぶれかも。`;
      }
      if (windy) {
        return `${windText}。雲の流れは早め。`;
      }
      return `${windText}。大きく崩れにくい空に見えます。`;
    }

    async function startSkyCamera() {
      if (!navigator.mediaDevices?.getUserMedia) {
        elements.skyResult.innerHTML = "<strong>カメラが使えません</strong>このブラウザではカメラ機能に対応していないようです。";
        return;
      }

      try {
        if (!skyStream) {
          const skyCameraOptions = [
            { video: { facingMode: { ideal: "environment" }, width: { ideal: 640 }, height: { ideal: 480 } }, audio: false },
            { video: { facingMode: "environment" }, audio: false },
            { video: true, audio: false }
          ];

          for (const options of skyCameraOptions) {
            try {
              skyStream = await navigator.mediaDevices.getUserMedia(options);
              break;
            } catch (cameraError) {
              if (options === skyCameraOptions[skyCameraOptions.length - 1]) throw cameraError;
            }
          }
        }
        elements.skyVideo.srcObject = skyStream;
        elements.skyVideo.setAttribute("playsinline", "");
        elements.skyVideo.setAttribute("webkit-playsinline", "");
        elements.skyVideo.muted = true;
        await elements.skyVideo.play();
        elements.skyCamera.classList.add("active");
        elements.skyResult.innerHTML = "<strong>カメラ起動中</strong>空を大きく入れて「雲を見てみる」を押してください。";
      } catch (error) {
        elements.skyResult.innerHTML = "<strong>カメラを開けませんでした</strong>ブラウザのカメラ許可を確認してください。公開サイトのHTTPS上なら動きやすいです。";
      }
    }

    function classifyCloud(stats) {
      const cloudCover = stats.whiteRatio + stats.grayRatio + stats.darkRatio;
      const rainChance = getSelectedRainChance();
      const humid = Number.isFinite(currentWeatherContext.humidity) && currentWeatherContext.humidity >= 78;
      const rainy = Number.isFinite(rainChance) && rainChance >= 55;
      const brightTexture = stats.brightnessVariance > 260;

      if (stats.darkRatio > 0.34 && stats.blueRatio < 0.14 && stats.averageBrightness < 105) {
        return {
          key: "cumulonimbus",
          name: "雨雲・積乱雲寄り",
          detail: "詳しい候補: 積乱雲、乱層雲",
          note: "暗く厚い雲が多めです。上昇気流が強い時や、雨が近い時に見えやすいタイプです。"
        };
      }
      if ((stats.darkRatio > 0.18 && stats.grayRatio > 0.22 && (humid || rainy)) || (stats.darkRatio > 0.26 && stats.blueRatio < 0.2)) {
        return {
          key: "nimbostratus",
          name: "厚い灰色雲寄り",
          detail: "詳しい候補: 乱層雲、層積雲",
          note: "低く重い雲。雨の前後に出やすいです。"
        };
      }
      if (cloudCover > 0.70 && stats.grayRatio > stats.whiteRatio * 0.8) {
        return {
          key: "stratus",
          name: "層雲・高層雲寄り",
          detail: "詳しい候補: 層雲、高層雲、層積雲",
          note: "空を広く覆う雲。日差しが弱めです。"
        };
      }
      if (stats.whiteRatio > 0.18 && stats.whiteRatio < 0.46 && stats.blueRatio > 0.22 && brightTexture && stats.darkRatio < 0.16) {
        return {
          key: "altocumulus",
          name: "ひつじ雲っぽい",
          detail: "詳しい候補: 高積雲、うろこ雲",
          note: "白い小さな雲が並ぶ感じ。天気の変化前に見えることも。"
        };
      }
      if (stats.whiteRatio > 0.08 && stats.whiteRatio < 0.30 && stats.blueRatio > 0.36 && stats.averageBrightness > 145 && stats.darkRatio < 0.12) {
        return {
          key: "cirrocumulus",
          name: "うろこ雲っぽい",
          detail: "詳しい候補: 巻積雲、巻雲",
          note: "高い空の細かな白雲っぽい見え方です。"
        };
      }
      if (stats.whiteRatio > 0.34 && stats.grayRatio < 0.25 && stats.darkRatio < 0.16) {
        return {
          key: "white-cloud",
          name: "白い雲多め",
          detail: "詳しい候補: 積雲、高積雲、巻積雲",
          note: "白く明るい雲を検出。積雲や薄い雲の可能性があります。"
        };
      }
      if (stats.whiteRatio > 0.14 && stats.blueRatio > 0.10 && stats.darkRatio < 0.22) {
        return {
          key: "cumulus",
          name: "積雲寄り",
          detail: "詳しい候補: 積雲、層積雲",
          note: "白くもこもこした雲。午後に育つことがあります。"
        };
      }
      if (cloudCover > 0.10 && stats.averageBrightness > 135 && stats.darkRatio < 0.16) {
        return {
          key: "cirrus",
          name: "薄雲・巻雲寄り",
          detail: "詳しい候補: 巻雲、巻層雲",
          note: "薄く明るい雲。天気の変わり目に出ることも。"
        };
      }
      if (stats.darkRatio > 0.36 && stats.blueRatio < 0.1 && stats.grayRatio < 0.18) {
        return {
          key: "silhouette",
          name: "逆光・影が多いかも",
          detail: "詳しい候補: 判定保留",
          note: "暗い部分は多いですが、雲というより建物・木・逆光の影を拾っている可能性があります。空だけが大きく入るようにすると判定しやすくなります。"
        };
      }
      return {
        key: "clear",
        name: "青空多め",
        detail: "詳しい候補: 雲少なめ",
        note: "雲は少なめ。晴れ寄りの空です。"
      };
    }

    function readPixelProfile(data, index) {
      const r = data[index];
      const g = data[index + 1];
      const b = data[index + 2];
      const brightness = (r + g + b) / 3;
      const spread = Math.max(r, g, b) - Math.min(r, g, b);
      const blueDominance = b - Math.max(r, g);
      const isBlueSky = b > r + 18 && b > g + 6 && brightness > 90;
      const isWhiteCloud = brightness > 154 && spread < 78 && blueDominance < 42;
      const isGrayCloud = brightness > 112 && brightness <= 172 && spread < 48 && blueDominance < 18;
      const isDarkCloud = brightness > 58 && brightness <= 112 && spread < 42;
      const isGreenObject = g > r + 18 && g > b + 14 && brightness > 50 && brightness < 195;
      const isEarthObject = r > b + 22 && g > b + 10 && brightness > 55 && brightness < 190 && spread > 24;
      const isVeryDarkObject = brightness <= 58;
      const isSaturatedObject = spread > 94 && brightness < 210 && !isBlueSky;
      const isObjectLike = isGreenObject || isEarthObject || isVeryDarkObject || isSaturatedObject;
      const isSkyCandidate = !isObjectLike && (isBlueSky || isWhiteCloud || isGrayCloud || isDarkCloud);

      return {
        brightness,
        isBlueSky,
        isWhiteCloud,
        isGrayCloud,
        isDarkCloud,
        isGreenObject,
        isEarthObject,
        isVeryDarkObject,
        isSaturatedObject,
        isSkyCandidate
      };
    }

    function readSkyStats(data, width, height) {
      const total = width * height;
      const profiles = new Array(total);
      const candidates = new Uint8Array(total);
      const skyMask = new Uint8Array(total);
      let green = 0;
      let earth = 0;
      let saturated = 0;
      let veryDark = 0;

      for (let pixel = 0; pixel < total; pixel += 1) {
        const profile = readPixelProfile(data, pixel * 4);
        profiles[pixel] = profile;
        candidates[pixel] = profile.isSkyCandidate ? 1 : 0;
        if (profile.isGreenObject) green += 1;
        if (profile.isEarthObject) earth += 1;
        if (profile.isSaturatedObject) saturated += 1;
        if (profile.isVeryDarkObject) veryDark += 1;
      }

      const queue = [];
      const seedRows = Math.max(1, Math.round(height * 0.18));
      for (let y = 0; y < seedRows; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const pixel = y * width + x;
          if (candidates[pixel] && !skyMask[pixel]) {
            skyMask[pixel] = 1;
            queue.push(pixel);
          }
        }
      }

      for (let cursor = 0; cursor < queue.length; cursor += 1) {
        const pixel = queue[cursor];
        const x = pixel % width;
        const y = Math.floor(pixel / width);
        const neighbors = [
          x > 0 ? pixel - 1 : -1,
          x < width - 1 ? pixel + 1 : -1,
          y > 0 ? pixel - width : -1,
          y < height - 1 ? pixel + width : -1
        ];

        neighbors.forEach((next) => {
          if (next >= 0 && candidates[next] && !skyMask[next]) {
            skyMask[next] = 1;
            queue.push(next);
          }
        });
      }

      let white = 0;
      let gray = 0;
      let dark = 0;
      let blue = 0;
      let skyCount = 0;
      let brightnessTotal = 0;
      let brightnessSquared = 0;

      skyMask.forEach((isSky, pixel) => {
        if (!isSky) return;
        const profile = profiles[pixel];
        skyCount += 1;
        brightnessTotal += profile.brightness;
        brightnessSquared += profile.brightness * profile.brightness;
        if (profile.isBlueSky) blue += 1;
        else if (profile.isWhiteCloud) white += 1;
        else if (profile.isGrayCloud) gray += 1;
        else if (profile.isDarkCloud) dark += 1;
      });

      const safeSkyCount = Math.max(skyCount, 1);
      const averageBrightness = brightnessTotal / safeSkyCount;
      const brightnessVariance = brightnessSquared / safeSkyCount - averageBrightness * averageBrightness;

      return {
        whiteRatio: white / safeSkyCount,
        grayRatio: gray / safeSkyCount,
        darkRatio: dark / safeSkyCount,
        blueRatio: blue / safeSkyCount,
        greenRatio: green / total,
        earthRatio: earth / total,
        saturatedRatio: saturated / total,
        veryDarkRatio: veryDark / total,
        skyCoverage: skyCount / total,
        skyPixelCount: skyCount,
        skyMask,
        averageBrightness,
        brightnessVariance
      };
    }

    function buildSkyPreview(video, data, width, height, skyMask) {
      const sourceWidth = video.videoWidth || width;
      const sourceHeight = video.videoHeight || height;
      const targetWidth = Math.min(720, Math.max(360, sourceWidth));
      const targetHeight = Math.max(1, Math.round(targetWidth * sourceHeight / sourceWidth));
      const previewCanvas = document.createElement("canvas");
      previewCanvas.width = targetWidth;
      previewCanvas.height = targetHeight;
      const previewContext = previewCanvas.getContext("2d", { willReadFrequently: true });
      previewContext.imageSmoothingEnabled = true;
      previewContext.imageSmoothingQuality = "high";
      previewContext.drawImage(video, 0, 0, targetWidth, targetHeight);
      const image = previewContext.getImageData(0, 0, targetWidth, targetHeight);

      for (let y = 0; y < targetHeight; y += 1) {
        const maskY = Math.min(height - 1, Math.floor(y * height / targetHeight));
        for (let x = 0; x < targetWidth; x += 1) {
          const maskX = Math.min(width - 1, Math.floor(x * width / targetWidth));
          const target = (y * targetWidth + x) * 4;
          const isSky = skyMask[maskY * width + maskX] === 1;
          if (!isSky) {
            image.data[target] = Math.round(image.data[target] * 0.22);
            image.data[target + 1] = Math.round(image.data[target + 1] * 0.22);
            image.data[target + 2] = Math.round(image.data[target + 2] * 0.22);
          }
          image.data[target + 3] = 255;
        }
      }

      previewContext.putImageData(image, 0, 0);
      return previewCanvas.toDataURL("image/jpeg", 0.9);
    }

    function getSkyFrameWarning(stats) {
      const cloudSignal = stats.whiteRatio + stats.grayRatio + stats.darkRatio;
      const skySignal = stats.blueRatio + cloudSignal;
      const objectSignal = stats.greenRatio + stats.earthRatio + stats.saturatedRatio + stats.veryDarkRatio;

      if (stats.skyCoverage < 0.18 || skySignal < 0.18) {
        return {
          title: "空が少なそうです",
          body: "上側からつながる空の領域が少ないので、まだ雲として判定しません。スマホを少し上に向けて、空を大きく入れてください。"
        };
      }
      if (objectSignal > 0.34 && stats.blueRatio < 0.20) {
        return {
          title: "空以外が多そうです",
          body: "木・建物・室内・影っぽい色が多めです。空ウォッチは、画面の7割くらいを空にするとかなり読みやすくなります。"
        };
      }
      if (stats.skyCoverage > 0.70 && stats.blueRatio < 0.03 && stats.brightnessVariance < 45) {
        return {
          title: "空か壁か迷っています",
          body: "画面がかなり均一な白や灰色です。曇り空にも見えますが、壁や天井も似た写り方になります。屋外の明るさや雲の境目が入る角度で試してください。"
        };
      }
      if (stats.veryDarkRatio > 0.30 && stats.blueRatio < 0.12 && stats.averageBrightness < 95) {
        return {
          title: "影や室内を拾っているかも",
          body: "暗い部分が多く、雲というより影や室内を見ている可能性があります。明るい空にカメラを向けてもう一度試してください。"
        };
      }
      if (stats.blueRatio < 0.04 && cloudSignal > 0.70 && stats.averageBrightness > 118 && stats.saturatedRatio < 0.05) {
        return {
          title: "空か壁か迷っています",
          body: "白や灰色が画面いっぱいに入っています。曇り空の可能性もありますが、壁や紙も似た色になります。地平線や空の明るさが少し入る角度で試してください。"
        };
      }
      return null;
    }

    function analyzeSkyFrame() {
      if (!elements.skyVideo.srcObject || elements.skyVideo.readyState < 2) {
        elements.skyResult.innerHTML = "<strong>まだ見られません</strong>先にカメラを開始して、空を画面に入れてください。";
        return;
      }

      const canvas = elements.skyCanvas;
      const context = canvas.getContext("2d", { willReadFrequently: true });
      context.drawImage(elements.skyVideo, 0, 0, canvas.width, canvas.height);
      const { data } = context.getImageData(0, 0, canvas.width, canvas.height);
      const stats = readSkyStats(data, canvas.width, canvas.height);
      const previewUrl = buildSkyPreview(elements.skyVideo, data, canvas.width, canvas.height, stats.skyMask);
      const previewImage = `<img class="sky-preview" src="${previewUrl}" alt="検出した空のプレビュー。空以外は暗く表示しています。">`;
      const skyWarning = getSkyFrameWarning(stats);
      if (skyWarning) {
        const objectText = `検出した空 ${Math.round(stats.skyCoverage * 100)}% / 空以外っぽさ ${Math.round((stats.greenRatio + stats.earthRatio + stats.saturatedRatio + stats.veryDarkRatio) * 100)}%`;
        elements.skyResult.innerHTML = `${previewImage}<strong>${skyWarning.title}</strong>${objectText}<br>${skyWarning.body}`;
        return;
      }
      const cloudType = classifyCloud(stats);
      const humidity = currentWeatherContext.humidity;
      const rainChance = getSelectedRainChance();
      const humidityText = Number.isFinite(humidity) ? `湿度 ${Math.round(humidity)}%` : "湿度 --";
      const rainText = rainChance !== null ? `降水 ${rainChance}%` : "降水 --";
      const windText = Number.isFinite(currentWeatherContext.windSpeed)
        ? `風 ${windDirectionLabel(currentWeatherContext.windDirection)} ${Math.round(currentWeatherContext.windSpeed)}km/h`
        : "風 --";
      const coverText = `空 ${Math.round(stats.skyCoverage * 100)}% / 白 ${Math.round(stats.whiteRatio * 100)}% / 灰 ${Math.round(stats.grayRatio * 100)}% / 暗 ${Math.round(stats.darkRatio * 100)}% / 青 ${Math.round(stats.blueRatio * 100)}%`;
      const trendText = describeSkyTrend(cloudType, stats);

      elements.skyResult.innerHTML = `${previewImage}<strong>${cloudType.name}</strong>${cloudType.detail}<br>${coverText}<br>${humidityText} / ${rainText} / ${windText}<br>${cloudType.note}<br>${trendText}`;
    }

    function useCurrentLocationWeather() {
      if (!navigator.geolocation) {
        elements.skyResult.innerHTML = "<strong>現在地が使えません</strong>このブラウザでは位置情報に対応していないようです。";
        return;
      }

      elements.skyResult.innerHTML = "<strong>現在地を確認中</strong>許可されたら、その場所の天気と風向きを読み込みます。";
      navigator.geolocation.getCurrentPosition((position) => {
        const { latitude, longitude } = position.coords;
        fetchWeatherFor({
          name: "現在地",
          latitude,
          longitude,
          fallback: { temperature: 28, humidity: 65, code: 2, time: "2026-07-11T12:00", windSpeed: 4, windDirection: 180, pressure: 1012 }
        }, "");
      }, () => {
        elements.skyResult.innerHTML = "<strong>現在地を取れませんでした</strong>ブラウザの位置情報許可を確認してください。";
      }, {
        enableHighAccuracy: false,
        timeout: 10000,
        maximumAge: 300000
      });
    }

    function renderForecastDetail(index) {
      const daily = activeDailyForecast;
      if (!daily || !daily.time || !daily.time.length) {
        elements.forecastDetail.innerHTML = "";
        return;
      }

      const date = daily.time[index];
      const code = Number(daily.weather_code?.[index]);
      const high = Math.round(Number(daily.temperature_2m_max?.[index]));
      const low = Math.round(Number(daily.temperature_2m_min?.[index]));
      const mean = Math.round(Number(daily.temperature_2m_mean?.[index]));
      const rain = daily.precipitation_probability_max?.[index];
      const [emoji, label] = getWeatherLabel(code);

      elements.forecastDetail.innerHTML = `<article class="forecast-card" style="--delay:${index * 0.12}s">
        <div class="forecast-date">${formatForecastDate(date, index)}</div>
        <div class="forecast-emoji" aria-hidden="true">${emoji}</div>
        <div>
          <div class="forecast-weather">${label}</div>
          <div class="forecast-temp"><strong>最高 ${Number.isFinite(high) ? high : "--"}°</strong><span>最低 ${Number.isFinite(low) ? low : "--"}°</span></div>
          <div class="forecast-mean">平均気温 ${Number.isFinite(mean) ? `${mean}°` : "--"}</div>
          <div class="forecast-rain">降水 ${Number.isFinite(Number(rain)) ? `${Math.round(Number(rain))}%` : "--"}</div>
        </div>
      </article>`;
      renderHourlyForecast(date);
    }

    function selectForecastDay(index) {
      selectedForecastIndex = index;
      elements.forecastList.querySelectorAll("[data-forecast-index]").forEach((button) => {
        button.setAttribute("aria-pressed", String(Number(button.dataset.forecastIndex) === selectedForecastIndex));
      });
      renderForecastDetail(selectedForecastIndex);
    }

    function renderForecast(daily, hourly) {
      if (!daily || !daily.time || !daily.time.length) {
        elements.forecastList.innerHTML = "";
        elements.forecastDetail.innerHTML = "";
        elements.hourlyList.innerHTML = "";
        return;
      }

      activeDailyForecast = daily;
      activeHourlyForecast = hourly;
      selectedForecastIndex = Math.min(selectedForecastIndex, daily.time.length - 1);
      elements.forecastList.innerHTML = daily.time.slice(0, 7).map((date, index) => (
        `<button class="forecast-day" type="button" data-forecast-index="${index}" aria-pressed="${index === selectedForecastIndex}">
          ${formatForecastTab(date, index)}
        </button>`
      )).join("");
      renderForecastDetail(selectedForecastIndex);
    }

    function renderWeather(city, current, daily, hourly, source) {
      const code = Number(current.weather_code);
      const temperature = Math.round(Number(current.temperature_2m));
      const humidity = Number(current.relative_humidity_2m);
      const [emoji, label] = getWeatherLabel(code);
      currentWeatherContext = {
        humidity,
        label,
        rain: getSelectedRainChance(),
        cityName: city.name,
        windSpeed: Number(current.wind_speed_10m),
        windDirection: Number(current.wind_direction_10m),
        pressure: Number(current.pressure_msl)
      };

      elements.app.classList.remove("skeleton");
      elements.cityName.textContent = city.name;
      animateTemperature(temperature);
      elements.humidity.textContent = Number.isFinite(humidity) ? `${Math.round(humidity)}%` : "--";
      elements.weatherEmoji.textContent = emoji;
      elements.weatherText.textContent = label;
      elements.observedAt.textContent = formatTime(current.time);
      elements.weatherCode.textContent = String(code);
      renderForecast(daily, hourly);

      if (source === "live") {
        elements.dataSource.textContent = "Open-Meteo";
        elements.message.textContent = `${city.name}の現在の天気と7日間予報です。`;
        setStatus("更新済み", "ok");
      } else {
        elements.dataSource.textContent = "サンプル";
        elements.message.textContent = "APIに接続できないため、画面確認用のサンプル値と予報を表示しています。";
        setStatus("サンプル表示", "demo");
      }
    }

    function setActiveButton(cityKey) {
      elements.buttons.forEach((button) => {
        button.setAttribute("aria-pressed", String(button.dataset.city === cityKey));
      });
    }

    async function fetchWeatherFor(city, sourceKey) {
      setActiveButton(sourceKey || "");
      setLoading(city);

      if (activeRequest) {
        activeRequest.abort();
      }

      activeRequest = new AbortController();
      const timeoutId = setTimeout(() => activeRequest.abort(), 9000);
      const params = new URLSearchParams({
        latitude: city.latitude,
        longitude: city.longitude,
        current: "temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m,pressure_msl",
        daily: "weather_code,temperature_2m_max,temperature_2m_min,temperature_2m_mean,precipitation_probability_max",
        hourly: "temperature_2m,weather_code,precipitation_probability",
        forecast_days: "7",
        timezone: "Asia/Tokyo"
      });

      try {
        const response = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`, {
          signal: activeRequest.signal,
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const data = await response.json();
        renderWeather(city, data.current, data.daily, data.hourly, "live");
      } catch (error) {
        const fallback = city.fallback || { temperature: 28, humidity: 65, code: 2, time: "2026-07-04T12:00" };
        renderWeather(city, {
          temperature_2m: fallback.temperature,
          relative_humidity_2m: fallback.humidity,
          weather_code: fallback.code,
          time: fallback.time,
          wind_speed_10m: fallback.windSpeed || 4,
          wind_direction_10m: fallback.windDirection || 180,
          pressure_msl: fallback.pressure || 1012
        }, buildFallbackDaily(fallback), buildFallbackHourly(fallback), "demo");
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function compactPlaceText(value) {
      return String(value || "")
        .normalize("NFKC")
        .toLowerCase()
        .replace(/[ぁ-ん]/g, (char) => String.fromCharCode(char.charCodeAt(0) + 0x60))
        .replace(/[\s,，、.．・/／\\\-＿_()（）[\]【】{}「」『』:：;；]/g, "");
    }

    function stripAdministrativeSuffixes(value) {
      return compactPlaceText(value).replace(/(都|道|府|県|市|区|町|村|郡|州|省|県庁所在地|prefecture|city|ward|town|village|county|state|province|country)/g, "");
    }

    function scoreField(inputCompact, inputLoose, fieldValue, weight) {
      const fieldCompact = compactPlaceText(fieldValue);
      const fieldLoose = stripAdministrativeSuffixes(fieldValue);
      if (!fieldCompact) return 0;

      let score = 0;
      if (inputCompact === fieldCompact) score += weight * 3;
      if (inputLoose === fieldLoose) score += weight * 2.5;
      if (inputCompact.includes(fieldCompact)) score += weight * 2;
      if (fieldCompact.includes(inputCompact)) score += weight * 1.3;
      if (fieldLoose && inputLoose.includes(fieldLoose)) score += weight * 1.6;
      if (fieldLoose && fieldLoose.includes(inputLoose)) score += weight;
      return score;
    }

    function scorePlaceCandidate(result, originalInput) {
      const inputCompact = compactPlaceText(originalInput);
      const inputLoose = stripAdministrativeSuffixes(originalInput);
      let score = 0;

      score += scoreField(inputCompact, inputLoose, result.name, 30);
      score += scoreField(inputCompact, inputLoose, result.admin1, 22);
      score += scoreField(inputCompact, inputLoose, result.admin2, 18);
      score += scoreField(inputCompact, inputLoose, result.admin3, 12);
      score += scoreField(inputCompact, inputLoose, result.country, 14);
      score += scoreField(inputCompact, inputLoose, result.country_code, 10);

      const combined = [result.name, result.admin3, result.admin2, result.admin1, result.country, result.country_code]
        .filter(Boolean)
        .join("");
      const combinedCompact = compactPlaceText(combined);
      const combinedLoose = stripAdministrativeSuffixes(combined);
      if (combinedCompact.includes(inputCompact)) score += 24;
      if (combinedLoose.includes(inputLoose)) score += 18;

      if (result.country_code === "JP" && /日本|japan|jp/.test(originalInput.toLowerCase())) score += 12;
      return score + (result.population ? Math.min(Math.log10(result.population), 7) : 0);
    }

    function chooseBestPlace(results, originalInput) {
      return results
        .map((result, index) => ({ result, index, score: scorePlaceCandidate(result, originalInput) }))
        .sort((a, b) => b.score - a.score || a.index - b.index)[0].result;
    }

    function uniqueValues(values) {
      return [...new Set(values.map((value) => value.trim()).filter(Boolean))];
    }

    function buildPlaceSearchTerms(placeName) {
      const normalized = String(placeName || "").normalize("NFKC");
      const parts = normalized
        .split(/[\s,，、・/／\\()（）[\]【】{}「」『』:：;；]+/)
        .filter(Boolean);
      const japaneseAdminParts = normalized.match(/[一-龥々ぁ-んァ-ンー]+?(?:都|道|府|県|市|区|町|村)/g) || [];
      const baseParts = uniqueValues([...parts, ...japaneseAdminParts])
        .filter((part) => !/^(日本|japan|jp)$/i.test(part));
      const suffixTerms = baseParts
        .filter((part) => /[一-龥々ぁ-んァ-ンー]/.test(part) && !/(都|道|府|県|市|区|町|村)$/.test(part))
        .flatMap((part) => [`${part}市`, `${part}町`, `${part}村`, `${part}区`]);

      return uniqueValues([normalized, ...baseParts, ...suffixTerms]).slice(0, 12);
    }

    async function fetchGeocodingResults(searchTerm) {
      const params = new URLSearchParams({
        name: searchTerm,
        count: "20",
        language: "ja",
        format: "json"
      });
      const response = await fetch(`https://geocoding-api.open-meteo.com/v1/search?${params}`, { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      const data = await response.json();
      return data.results || [];
    }

    async function searchPlace(placeName) {
      const resultsById = new Map();
      const searchTerms = buildPlaceSearchTerms(placeName);

      for (const term of searchTerms) {
        const results = await fetchGeocodingResults(term);
        results.forEach((result) => {
          resultsById.set(result.id || `${result.latitude},${result.longitude},${result.name}`, result);
        });
      }

      const results = [...resultsById.values()];
      if (!results.length) {
        throw new Error("not found");
      }
      const result = chooseBestPlace(results, placeName);
      return {
        name: [result.name, result.admin2, result.admin1, result.country].filter(Boolean).join(" / "),
        latitude: result.latitude,
        longitude: result.longitude
      };
    }

    function unlockAdvanced() {
      advancedUnlocked = true;
      sessionStorage.setItem("otenki-advanced", "yes");
      elements.advanced.classList.add("unlocked");
      elements.secretFeedback.classList.remove("error");
      elements.secretFeedback.textContent = "拡張モードを開きました。好きな場所の検索と空ウォッチが使えます。";
      elements.passphrase.value = "";
      elements.placeSearch.focus();
    }

    async function handleSecret(event) {
      event.preventDefault();
      elements.secretFeedback.classList.remove("error");
      elements.secretFeedback.textContent = "合言葉を確認中...";
      const hashed = await hashPassphrase(elements.passphrase.value);
      if (timingSafeEqual(hashed, passConfig.hash)) {
        unlockAdvanced();
      } else {
        elements.secretFeedback.classList.add("error");
        elements.secretFeedback.textContent = "合言葉が違います。";
        elements.passphrase.select();
      }
    }

    async function handleSearch(event) {
      event.preventDefault();
      if (!advancedUnlocked) return;
      const placeName = elements.placeSearch.value.trim();
      if (!placeName) return;
      elements.secretFeedback.classList.remove("error");
      elements.secretFeedback.textContent = `${placeName}を探しています...`;
      try {
        const city = await searchPlace(placeName);
        await fetchWeatherFor(city, "");
        elements.secretFeedback.textContent = `${city.name}を表示しました。`;
      } catch (error) {
        elements.secretFeedback.classList.add("error");
        elements.secretFeedback.textContent = "場所が見つかりませんでした。別の名前で試してください。";
      }
    }

    elements.buttons.forEach((button) => {
      button.addEventListener("click", () => fetchWeatherFor(cities[button.dataset.city], button.dataset.city));
    });

    elements.forecastList.addEventListener("click", (event) => {
      const button = event.target.closest("[data-forecast-index]");
      if (!button) return;
      selectForecastDay(Number(button.dataset.forecastIndex));
    });

    elements.startSkyCamera?.addEventListener("click", startSkyCamera);
    elements.analyzeSky?.addEventListener("click", analyzeSkyFrame);
    elements.useCurrentLocation?.addEventListener("click", useCurrentLocationWeather);

    elements.secretForm.addEventListener("submit", handleSecret);
    elements.searchForm.addEventListener("submit", handleSearch);
    buildEffects();

    if (advancedUnlocked) {
      elements.advanced.classList.add("unlocked");
      elements.secretFeedback.textContent = "拡張モードが開いています。好きな場所検索と空ウォッチが使えます。";
    }

    fetchWeatherFor(cities.takamatsu, "takamatsu");
  </script>
